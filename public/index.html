<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bizify - Google Login Test</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f7f9fc; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        h1 { margin-top: 0; color: #333; }
        .btn-google { display: inline-flex; align-items: center; justify-content: center; background-color: white; color: #757575; font-weight: 500; font-size: 14px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; text-decoration: none; transition: background-color 0.2s; width: 100%; box-sizing: border-box; margin-top: 20px;}
        .btn-google:hover { background-color: #f8f8f8; }
        .btn-google img { width: 18px; margin-right: 12px; }
        #status { margin-top: 20px; font-size: 14px; color: #555; text-align: left; background: #eee; padding: 10px; border-radius: 4px; display: none; word-break: break-all;}
    </style>
</head>
<body>
    <div class="card">
        <h1>Bizify Login</h1>
        <p>This is a simulated frontend to test the Google OAuth flow.</p>
        
        <button id="login-btn" class="btn-google">
            <svg style="width: 18px; margin-right:8px" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
        </button>

        <div id="status"></div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api/v1";
        const btn = document.getElementById("login-btn");
        const statusDiv = document.getElementById("status");

        // 1. Get the Google URL from backend and redirect
        btn.onclick = async () => {
            btn.innerText = "Loading...";
            try {
                const res = await fetch(`${API_BASE}/auth/google/url`);
                const data = await res.json();
                window.location.href = data.url;
            } catch (e) {
                alert("Error connecting to backend");
                btn.innerText = "Continue with Google";
            }
        };

        // 2. We've returned from Google. Extract code and send to backend
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                // Clear the URL
                window.history.replaceState({}, document.title, "/");
                
                statusDiv.style.display = "block";
                statusDiv.innerText = "Processing code...";
                btn.style.display = "none";

                try {
                    const res = await fetch(`${API_BASE}/auth/google/callback`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok) {
                        statusDiv.innerHTML = `<span style="color: green"> Success!</span><br><br><b>Access Token:</b><br>${data.access_token}`;
                    } else {
                        statusDiv.innerHTML = `<span style="color: red"> Error:</span><br>${data.detail || JSON.stringify(data)}`;
                    }
                } catch (e) {
                    statusDiv.innerText = "Error completing login";
                }
            }
        };
    </script>
</body>
</html>
