# =============================================================================
# Bizify — local development stack
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy / load balancer (public entry point)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NGINX_DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt TLS certificate management
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ---------------------------------------------------------------------------
  # PostgreSQL database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bizify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bizify_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bizify}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bizify} -d ${POSTGRES_DB:-bizify}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Bizify API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point at the compose db service
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bizify}:${POSTGRES_PASSWORD:-bizify_secret}@db:5432/${POSTGRES_DB:-bizify}
      APP_ENV: development
    ports:
      - "8001:8001"
    volumes:
      # Hot-reload source in development (remove in production)
      - .:/app
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Background Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-bizify}:${POSTGRES_PASSWORD:-bizify_secret}@db:5432/${POSTGRES_DB:-bizify}
      APP_ENV: development
      REDIS_HOST: redis
    command: [ "python", "worker.py" ]
    volumes:
      - .:/app

  # ---------------------------------------------------------------------------
  # pgAdmin — optional, only started with: docker-compose --profile debug up
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles: [ debug ]
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bizify.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

volumes:
  postgres_data:
