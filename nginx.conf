# =============================================================================
# Nginx Reverse Proxy — Bizify Backend
# =============================================================================
# Serves as the public-facing entry point. Forwards requests to the FastAPI
# app (api:8001) and adds production-grade hardening + HTTPS/TLS termination.
#
# Certificates are managed by Certbot (Let's Encrypt). Mount them via:
#   ./certbot/conf:/etc/letsencrypt:ro
#   ./certbot/www:/var/www/certbot:ro

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ─── Rate limiting zones (shared memory) ──────────────────────────────
    # General API: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    # Auth endpoints: 5 req/s per IP (stricter)
    limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=5r/s;

    # ─── TLS session cache (improves HTTPS performance) ───────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Modern TLS settings ──────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ─── OCSP stapling ─────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ─── Upstream (FastAPI container) ─────────────────────────────────────
    upstream bizify_api {
        server api:8001;
        keepalive 32;  # persistent connections to reduce TCP overhead
    }

    # ─── Gzip compression ─────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 5;
    gzip_types      application/json text/plain text/html application/javascript;
    gzip_min_length 256;

    # ─── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ACME challenge for Let's Encrypt certificate renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS certificates (Let's Encrypt via Certbot) ──────────────────
        # Replace YOURDOMAIN with your actual domain in docker-compose.yml
        ssl_certificate     /etc/letsencrypt/live/${NGINX_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${NGINX_DOMAIN}/privkey.pem;
        include             /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # ── Security headers ──────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    nosniff        always;
        add_header X-Frame-Options           DENY           always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           strict-origin  always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;

        # ── Health check (no rate limiting) ───────────────────────────────
        location = /health {
            proxy_pass         http://bizify_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # ── Auth routes (strict rate limit) ───────────────────────────────
        location ~ ^/api/v1/auth/(login|bootstrap-admin) {
            limit_req zone=api_auth burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://bizify_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── All other API routes ───────────────────────────────────────────
        location / {
            limit_req zone=api_general burst=60 nodelay;
            limit_req_status 429;

            proxy_pass         http://bizify_api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }
}
