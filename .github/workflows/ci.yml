name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: p7_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d p7_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: test
      SECRET_KEY: ci-test-secret-key-12345678901234567890
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/p7_test
    
    strategy:
      matrix:
        python-version: ['3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Alembic Migrations
      run: alembic upgrade head
      env:
        DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

    - name: Run Linting (Ruff)
      run: |
        ruff check . --config config/pyproject.toml --output-format=github
    
    - name: Run Type Checking (Mypy Gate)
      run: |
        mypy --config-file config/pyproject.toml \
          --explicit-package-bases \
          --follow-imports=skip \
          config/settings.py \
          app/db/database.py \
          app/core/security.py \
          app/core/dependencies.py \
          app/api/routes/auth.py \
          app/api/routes/users/user.py \
          app/api/routes/users/user_profile.py \
          app/api/routes/users/admin_action_log.py
    
    - name: Run Unit Tests
      run: |
        pytest tests/unit -v --tb=short
    
    - name: Run Integration Tests
      run: |
        pytest tests/integration -v --tb=short
    
    - name: Run Security Tests
      run: |
        pytest tests/security -v --tb=short
    
    - name: Generate Coverage Report
      run: |
        pytest --cov=. --cov-report=xml --cov-report=term-missing tests/
    
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Coverage Comment
      run: |
        echo "## Test Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        coverage report >> $GITHUB_STEP_SUMMARY
        echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
