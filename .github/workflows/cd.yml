name: CD - Build & Deploy

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [ "staging", "production" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: abdallah1002003/bizify-backend

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Build & Push Docker image
  # ─────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

      - name: Image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: table
          exit-code: 0          # advisory only — don't block deploy
          severity: "CRITICAL,HIGH"

  # ─────────────────────────────────────────────────────────────────
  # 2. Deploy to Staging (on main branch push or manual)
  # ─────────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_env == 'staging')
    environment:
      name: staging
      url: https://staging.bizify.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Staging SSH secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          set -eu
          test -n "$STAGING_HOST" || { echo "Missing secret: STAGING_HOST"; exit 1; }
          test -n "$STAGING_USER" || { echo "Missing secret: STAGING_USER"; exit 1; }
          test -n "$STAGING_SSH_KEY" || { echo "Missing secret: STAGING_SSH_KEY"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "${{ secrets.STAGING_HOST }}"
          username: "${{ secrets.STAGING_USER }}"
          key: "${{ secrets.STAGING_SSH_KEY }}"
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          debug: true
          script: |
            set -eu
            cd /opt/bizify
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available on the server"
              exit 1
            fi
            echo "Using compose command: $COMPOSE_CMD"
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --no-build
            $COMPOSE_CMD exec -T api alembic upgrade head
            docker image prune -f

      - name: Run Smoke Tests
        env:
          DEPLOY_URL: https://staging.bizify.app
        run: |
          python scripts/smoke_test.py $DEPLOY_URL

  # ─────────────────────────────────────────────────────────────────
  # 3. Deploy to Production (on version tag or manual)
  # ─────────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_env == 'production')
    environment:
      name: production
      url: https://bizify.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Production SSH secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          set -eu
          test -n "$PROD_HOST" || { echo "Missing secret: PROD_HOST"; exit 1; }
          test -n "$PROD_USER" || { echo "Missing secret: PROD_USER"; exit 1; }
          test -n "$PROD_SSH_KEY" || { echo "Missing secret: PROD_SSH_KEY"; exit 1; }

      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "${{ secrets.PROD_HOST }}"
          username: "${{ secrets.PROD_USER }}"
          key: "${{ secrets.PROD_SSH_KEY }}"
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          debug: true
          script: |
            set -eu
            cd /opt/bizify
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Neither 'docker compose' nor 'docker-compose' is available on the server"
              exit 1
            fi
            echo "Using compose command: $COMPOSE_CMD"
            $COMPOSE_CMD pull
            $COMPOSE_CMD up -d --no-build
            $COMPOSE_CMD exec -T api alembic upgrade head
            docker image prune -f

      - name: Run Smoke Tests (Production)
        env:
          DEPLOY_URL: https://bizify.app
        run: |
          python scripts/smoke_test.py $DEPLOY_URL

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changes in ${{ github.ref_name }}
            Docker image: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
            Digest: `${{ needs.build-and-push.outputs.image-digest }}`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
