<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
</head>

<body
    style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7fafc; margin: 0; padding: 0;">
    <div
        style="max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);">
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); padding: 32px; text-align: center;">
            <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.025em;">{{
                app_name }}</h1>
        </div>

        <!-- Content -->
        <div style="padding: 40px;">
            <h2 style="color: #1a202c; margin-top: 0; margin-bottom: 24px; font-size: 24px; font-weight: 700;">{{
                heading }}</h2>
            <div style="color: #4a5568; font-size: 16px; line-height: 1.6; margin-bottom: 32px;">
                {{ content_html | safe }}
            </div>

            {% if button_url %}
            <div style="text-align: center; margin-bottom: 32px;">
                <a href="{{ button_url }}"
                    style="display: inline-block; background-color: #4f46e5; color: #ffffff; padding: 14px 28px; font-weight: 600; text-decoration: none; border-radius: 8px; font-size: 16px; transition: background-color 0.2s;">
                    {{ button_text }}
                </a>
            </div>
            {% endif %}

            <hr style="border: 0; border-top: 1px solid #edf2f7; margin: 32px 0;">

            <p style="color: #718096; font-size: 14px; margin-bottom: 0;">
                {{ footer_text }}
            </p>
            {% if fallback_url %}
            <p style="color: #cbd5e0; font-size: 12px; margin-top: 12px; word-break: break-all;">
                Or copy this URL: <span style="color: #4f46e5;">{{ fallback_url }}</span>
            </p>
            {% endif %}
        </div>

        <!-- Footer -->
        <div style="background-color: #f8fafc; padding: 24px; text-align: center; border-top: 1px solid #edf2f7;">
            <p style="color: #a0aec0; font-size: 12px; margin: 0;">
                © 2026 {{ app_name }}. All rights reserved.
            </p>
        </div>
    </div>
</body>

</html>
