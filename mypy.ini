[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_untyped_defs = False
disable_error_code = import-untyped

[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-app.models.*]
ignore_errors = True

[mypy-app.api.routes.*]
disable_error_code = arg-type,assignment,return-value,union-attr,attr-defined,call-arg,import-not-found,no-any-return

