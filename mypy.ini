[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
no_implicit_optional = True
strict_optional = True
disable_error_code = import-untyped
exclude = (^tests/|^health_check\.py$|^test_alembic_vector\.py$|^\.venv/|^venv/|^alembic/)
plugins = sqlalchemy.ext.mypy.plugin

[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False
ignore_errors = False

[mypy-app.models.*]
ignore_errors = False
check_untyped_defs = True

[mypy-app.api.routes.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.users.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.partners.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.ideation.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.chat.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.business.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.billing.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.core.*]
disable_error_code = arg-type,union-attr

[mypy-app.services.ai.*]
disable_error_code = arg-type,union-attr

[mypy-app.db.*]
ignore_errors = False

[mypy-app.core.*]
ignore_errors = False
