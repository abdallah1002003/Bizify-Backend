apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bizify-api
  namespace: default
  labels:
    app: bizify-api
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rate-limit: "120"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  tls:
  - hosts:
    - api.bizify.com
    secretName: bizify-api-tls
  rules:
  - host: api.bizify.com
    http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: bizify-api
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: bizify-api
            port:
              number: 80
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: bizify-api
            port:
              number: 9090

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bizify-api-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: bizify-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8001
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8001
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow outbound to services
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external HTTPS (for OpenAI, Stripe, etc)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
