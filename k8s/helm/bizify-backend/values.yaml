replicaCount: 2

image:
  repository: ghcr.io/abdallah1002003/bizify-backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.bizify.app
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: bizify-api-tls
      hosts:
        - api.bizify.app

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

envFromSecret: "bizify-secrets"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
